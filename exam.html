<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Hardening Exam</title>
<style>
body {margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;}
.navbar{display:flex;justify-content:center;gap:15px;padding:15px;background: rgba(0,0,0,0.3);}
.nav-btn{text-decoration:none;color:white;padding:8px 15px;border-radius:6px;background: rgba(255,255,255,0.1);transition:0.3s;font-weight:bold;}
.nav-btn:hover{background: rgba(255,255,255,0.3);}
.container{padding: 40px 20px; max-width: 900px; margin:auto;}
h1{text-align:center;font-size:42px;margin-bottom:20px;color:#facc15;}
.tab-buttons{display:flex;justify-content:center;gap:15px;margin-bottom:30px;}
.tab-btn{padding: 10px 20px;border:none;border-radius:8px;cursor:pointer;background: rgba(255,255,255,0.1);color:#fff;font-weight:bold;transition:0.3s;}
.tab-btn:hover, .tab-btn.active{background: #38bdf8;color:#111;}
.exam-section{display:none;background: rgba(255,255,255,0.05);padding: 25px;border-radius: 15px;backdrop-filter: blur(8px);}
.exam-section.active{display:block;}
.question{margin-bottom:20px;}
.question h3{font-size:18px;margin-bottom:10px;}
.options label{display:block;margin-bottom:5px;cursor:pointer;}
button.submit-btn{padding:10px 20px;border:none;border-radius:8px;background:#22c55e;color:#111;font-weight:bold;cursor:pointer;transition:0.3s;}
button.submit-btn:hover{background:#16a34a;}
.result{margin-top:20px;font-size:18px;font-weight:bold;color:#facc15;}
.explanation{font-size:14px;color:#a5f3fc;margin-top:5px;}
</style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="about.html" class="nav-btn">About</a>
    <a href="author.html" class="nav-btn">Author</a>
    <a href="exam.html" class="nav-btn">Exam</a>
</div>

<div class="container">
    <h1>📝 Linux Hardening Practice Exams</h1>
    
    <div class="tab-buttons">
        <button class="tab-btn active" data-tab="rhel8">RHEL 8 Quiz</button>
        <button class="tab-btn" data-tab="rhel9">RHEL 9 Quiz</button>
        <button class="tab-btn" data-tab="mock">Mock Test</button>
    </div>

    <div id="rhel8" class="exam-section active"></div>
    <div id="rhel9" class="exam-section"></div>
    <div id="mock" class="exam-section"></div>

    <button class="submit-btn" onclick="checkAnswers()">Submit</button>
    <div class="result" id="exam-result"></div>
</div>

<script>
// Questions Arrays
const exams = {
    rhel8: [
        {q:"Which file controls SSH configurations in RHEL 8?", options:["/etc/ssh/sshd_config","/etc/ssh/config","/etc/passwd","/etc/security/limits.conf"], answer:0, explanation:"Secures SSH access and prevents root login."},
        {q:"Which command verifies journal logs?", options:["journalctl","systemctl status","dmesg","cat /var/log/messages"], answer:0, explanation:"Ensures integrity of system logs for auditing."},
        // Add up to 40 questions here
    ],
    rhel9: [
        {q:"Default firewall service in RHEL 9?", options:["firewalld","iptables","ufw","nftables"], answer:0, explanation:"firewalld is default for RHEL 9."},
        // Add up to 40 questions
    ],
    mock: [
        {q:"Which command changes file ownership?", options:["chown","chmod","ls","passwd"], answer:0, explanation:"chown changes file owner/group."},
        // Add up to 40 questions
    ]
};

// Tab switching
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.exam-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// Render questions dynamically
for (let key in exams) {
    const container = document.getElementById(key);
    exams[key].forEach((item,i)=>{
        const div = document.createElement('div');
        div.className = 'question';
        let opts = '';
        item.options.forEach((opt,j)=>{
            opts += `<label><input type="radio" name="${key}-${i}" value="${j}"> ${opt}</label>`;
        });
        div.innerHTML = `<h3>${i+1}. ${item.q}</h3><div class="options">${opts}</div><p class="explanation">${item.explanation}</p>`;
        container.appendChild(div);
    });
}

// Check Answers
function checkAnswers(){
    let score=0;
    for(let key in exams){
        exams[key].forEach((item,i)=>{
            const sel = document.querySelector(`input[name="${key}-${i}"]:checked`);
            if(sel && parseInt(sel.value)===item.answer) score++;
        });
    }
    document.getElementById('exam-result').innerText = `Your Score: ${score}/${Object.values(exams).reduce((a,b)=>a+b.length,0)}`;
}
</script>

</body>
</html>
