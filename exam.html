<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Hardening Exam</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}
.navbar {
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background: rgba(0,0,0,0.3);
}
.nav-btn {
    text-decoration:none;
    color:white;
    padding:8px 15px;
    border-radius:6px;
    background: rgba(255,255,255,0.1);
    transition:0.3s;
    font-weight:bold;
}
.nav-btn:hover {
    background: rgba(255,255,255,0.3);
}
.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}
h1{
    text-align:center;
    font-size:42px;
    margin-bottom:20px;
    color:#facc15;
}
.tab-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}
.tab-btn{
    padding: 10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background: rgba(255,255,255,0.1);
    color:#fff;
    font-weight:bold;
    transition:0.3s;
}
.tab-btn:hover, .tab-btn.active{
    background: #38bdf8;
    color:#111;
}
.exam-section{
    display:none;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(8px);
    margin-bottom:20px;
}
.exam-section.active{display:block;}
.question{margin-bottom:20px;}
.question h3{font-size:18px;margin-bottom:10px;}
.options label{display:block;margin-bottom:5px;cursor:pointer;}
.options input.correct + span { color: #22c55e; font-weight:bold; }
.options input.wrong + span { color: #ef4444; font-weight:bold; }
button.submit-btn, button.reset-btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    color:#111;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button.submit-btn{background:#22c55e;}
button.submit-btn:hover{background:#16a34a;}
button.reset-btn{background:#f87171;margin-left:10px;}
button.reset-btn:hover{background:#dc2626;}
.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#facc15;
    text-align:center;
}
.explanation{
    font-size:14px;
    color:#a5f3fc;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html" class="nav-btn">Home</a>
<a href="about.html" class="nav-btn">About</a>
<a href="author.html" class="nav-btn">Author</a>
<a href="exam.html" class="nav-btn">Exam</a>
</div>

<div class="container">
<h1>📝 Linux Hardening Practice Exams</h1>

<div class="tab-buttons">
<button class="tab-btn active" data-tab="rhel8">RHEL 8 Quiz</button>
<button class="tab-btn" data-tab="rhel9">RHEL 9 Quiz</button>
<button class="tab-btn" data-tab="mock">Mock Test</button>
</div>

<div id="rhel8" class="exam-section active"></div>
<div id="rhel9" class="exam-section"></div>
<div id="mock" class="exam-section"></div>

<button class="submit-btn" onclick="checkAnswers()">Submit</button>
<button class="reset-btn" onclick="resetExam()">Reset</button>

<div class="result" id="exam-result"></div>
</div>

<script>
const exams = {
rhel8:[
{q:"Which file logs authentication and security events?", options:["/var/log/secure","/var/log/messages","/var/log/syslog","/etc/secure"], answer:0, explanation:"Contains auth logs"},
{q:"Command to disable root SSH login?", options:["PermitRootLogin no","AllowRootLogin yes","RootLogin off","DenyRoot yes"], answer:0, explanation:"Prevents direct root login"},
{q:"Which configuration file controls system-wide umask?", options:["/etc/profile","/etc/passwd","/etc/shadow","/etc/umask"], answer:0, explanation:"Sets default permissions for all users"},
{q:"Command to find SUID files?", options:["find / -perm -4000","ls","chmod","ps"], answer:0, explanation:"Find SUID"},
{q:"Command to check open ports?", options:["ss -tuln","top","df","ps"], answer:0, explanation:"Open ports"},
{q:"Which command sets SELinux to enforcing mode?", options:["setenforce 1","getenforce","sestatus","setenforce 0"], answer:0, explanation:"Enforcing mode"},
{q:"Command to check disk usage?", options:["df -h","du","lsblk","fdisk"], answer:0, explanation:"Disk usage"},
{q:"Which file is used for setting password complexity rules?", options:["/etc/security/pwquality.conf","/etc/passwd","/etc/login.defs","/etc/shadow"], answer:0, explanation:"Password complexity settings"},
{q:"Command to restart service?", options:["systemctl restart","service","init","reload"], answer:0, explanation:"Restart"},
{q:"Command to view users?", options:["cat /etc/passwd","ls","who","ps"], answer:0, explanation:"Users"},
{q:"Command to lock user?", options:["usermod -L","passwd","chmod","ls"], answer:0, explanation:"Lock"},
{q:"Command to unlock user?", options:["usermod -U","passwd","chmod","ls"], answer:0, explanation:"Unlock"},
{q:"Which command lists all users with UID 0?", options:["awk -F: '$3==0 {print $1}' /etc/passwd","id","who","users"], answer:0, explanation:"UID 0 users are root level"},
{q:"Command to check SELinux?", options:["sestatus","getenforce","ls","ps"], answer:0, explanation:"SELinux"},
{q:"Which file sets default user password aging policies?", options:["/etc/login.defs","/etc/passwd","/etc/shadow","/etc/security/pwquality.conf"], answer:0, explanation:"Defines password aging defaults"}
],

rhel9:[
{q:"Which command is used to manage system-wide SELinux mode permanently in RHEL 9?", options:["/etc/selinux/config","setenforce","getenforce","sestatus"], answer:0, explanation:"Persistent SELinux configuration is set in config file"},
{q:"Which command is used to enable firewalld service in RHEL 9?", options:["systemctl enable --now firewalld","service firewalld start","chkconfig firewalld on","firewall-cmd start"], answer:0, explanation:"Enables and starts firewall service"},
{q:"Which command is used to apply security updates only?", options:["dnf update --security","yum update","dnf upgrade","rpm -U"], answer:0, explanation:"Applies only security-related patches"},
{q:"Which tool is used for centralized logging in RHEL 9?", options:["journalctl","syslog","logwatch","auditctl"], answer:0, explanation:"systemd journal logging system"},
{q:"Which command is used to persistently enable a SELinux boolean?", options:["setsebool -P","setenforce","getsebool","semanage"], answer:0, explanation:"-P makes it persistent"},
{q:"Which configuration file controls password complexity in RHEL 9?", options:["/etc/security/pwquality.conf","/etc/login.defs","/etc/passwd","/etc/shadow"], answer:0, explanation:"Defines password policies"},
{q:"Which command is used to audit system activity in RHEL 9?", options:["auditctl","ausearch","journalctl","dmesg"], answer:0, explanation:"Audit daemon configuration tool"},
{q:"Which command shows active firewall rules?", options:["firewall-cmd --list-all","iptables -L","ss -tuln","netstat"], answer:0, explanation:"Displays firewalld rules"},
{q:"Which command is used to permanently add a firewall rule?", options:["firewall-cmd --permanent","iptables -A","firewalld --add","ufw enable"], answer:0, explanation:"Adds persistent firewall rules"},
{q:"Which file contains user account information?", options:["/etc/passwd","/etc/shadow","/etc/group","/etc/security"], answer:0, explanation:"Basic user account details"},
{q:"Which file contains encrypted user passwords?", options:["/etc/shadow","/etc/passwd","/etc/group","/etc/login.defs"], answer:0, explanation:"Stores hashed passwords"},
{q:"Which command is used to check system logs in real-time?", options:["journalctl -f","tail -f","dmesg","less"], answer:0, explanation:"Follows live logs"},
{q:"Which command is used to check open ports in RHEL 9?", options:["ss -tulnp","netstat","lsof","ps"], answer:0, explanation:"Displays open sockets"},
{q:"Which command is used to verify file integrity using RPM?", options:["rpm -V","rpm -i","rpm -q","rpm -e"], answer:0, explanation:"Verifies installed package files"},
{q:"Which command is used to lock a user account in RHEL 9?", options:["usermod -L","passwd -u","useradd","chmod"], answer:0, explanation:"Locks the user account"},
{q:"Which command is used to display system boot logs?", options:["journalctl -b","dmesg","ls","top"], answer:0, explanation:"Shows boot logs from journal"}
],

mock:[
{q:"Change owner?", options:["chown","chmod","ls","pwd"], answer:0, explanation:"Ownership"},
{q:"Permissions?", options:["chmod","chown","ls","pwd"], answer:0, explanation:"Permissions"},
{q:"Processes?", options:["ps","ls","cat","rm"], answer:0, explanation:"Processes"},
{q:"Disk?", options:["df -h","ls","ps","pwd"], answer:0, explanation:"Disk"},
{q:"Ports?", options:["ss","top","df","ls"], answer:0, explanation:"Ports"},
{q:"Logs?", options:["journalctl","cat","ls","ps"], answer:0, explanation:"Logs"},
{q:"Restart?", options:["systemctl","service","init","reload"], answer:0, explanation:"Restart"},
{q:"Lock user?", options:["usermod -L","passwd","chmod","ls"], answer:0, explanation:"Lock"},
{q:"Unlock user?", options:["usermod -U","passwd","chmod","ls"], answer:0, explanation:"Unlock"},
{q:"SELinux?", options:["sestatus","getenforce","top","ps"], answer:0, explanation:"SELinux"},
{q:"Failed login?", options:["lastb","last","who","id"], answer:0, explanation:"Login"},
{q:"Hostname?", options:["hostname","uname","whoami","pwd"], answer:0, explanation:"Hostname"},
{q:"Env vars?", options:["env","set","print","vars"], answer:0, explanation:"Env"},
{q:"Open files?", options:["lsof","ps","top","df"], answer:0, explanation:"Files"},
{q:"Monitor?", options:["top","htop","ps","free"], answer:0, explanation:"Monitor"}
]
};

function renderExam(tab){
 const container=document.getElementById(tab);
 container.innerHTML="";
 exams[tab].forEach((item,index)=>{
  const qDiv=document.createElement("div");
  qDiv.className="question";
  qDiv.innerHTML=`<h3>${index+1}. ${item.q}</h3>
  <div class="options">
  ${item.options.map((opt,i)=>`<label><input type="radio" name="${tab}-${index}" value="${i}"><span>${opt}</span></label>`).join("")}
  </div>
  <div class="explanation" style="display:none;">${item.explanation}</div>`;
  container.appendChild(qDiv);
 });
}

['rhel8','rhel9','mock'].forEach(renderExam);

document.querySelectorAll('.tab-btn').forEach(btn=>{
 btn.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.exam-section').forEach(sec=>sec.classList.remove('active'));
  document.getElementById(btn.dataset.tab).classList.add('active');
 });
});

function checkAnswers(){
 let total=0;
 ['rhel8','rhel9','mock'].forEach(tab=>{
  exams[tab].forEach((q,idx)=>{
   const selected=document.querySelector(`input[name="${tab}-${idx}"]:checked`);
   const options=document.querySelectorAll(`input[name="${tab}-${idx}"]`);
   options.forEach(o=>o.classList.remove('correct','wrong'));
   if(selected){
    if(parseInt(selected.value)===q.answer){
     selected.classList.add('correct');
     total++;
    }else{
     selected.classList.add('wrong');
     options[q.answer].classList.add('correct');
    }
    selected.closest('.question').querySelector('.explanation').style.display='block';
   }
  });
 });
 document.getElementById('exam-result').innerText=`You got ${total} correct answers!`;
}

function resetExam(){
 document.querySelectorAll('input[type=radio]').forEach(i=>{
  i.checked=false;
  i.classList.remove('correct','wrong');
 });
 document.querySelectorAll('.explanation').forEach(e=>e.style.display='none');
 document.getElementById('exam-result').innerText='';
}
</script>

</body>
</html>
