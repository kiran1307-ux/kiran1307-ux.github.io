<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Hardening Exam</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}
.container {
    max-width:900px;
    margin:auto;
    padding:30px;
}
h1 {
    text-align:center;
    color:#facc15;
}
.tab-buttons {
    text-align:center;
    margin-bottom:20px;
}
.tab-btn {
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
    cursor:pointer;
}
.tab-btn.active {
    background:#38bdf8;
    color:black;
}
.exam-section {
    display:none;
}
.exam-section.active {
    display:block;
}
.question {
    margin-bottom:15px;
}
button {
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.submit-btn { background:#22c55e; }
.reset-btn { background:#ef4444; color:white; }
.result {
    margin-top:15px;
    font-weight:bold;
    color:#facc15;
}
</style>
</head>

<body>

<div class="container">
<h1>📝 Linux Hardening Practice Exams</h1>

<div class="tab-buttons">
    <button class="tab-btn active" data-tab="rhel8">RHEL8</button>
    <button class="tab-btn" data-tab="rhel9">RHEL9</button>
    <button class="tab-btn" data-tab="mock">Mock</button>
</div>

<div id="rhel8" class="exam-section active"></div>
<div id="rhel9" class="exam-section"></div>
<div id="mock" class="exam-section"></div>

<button class="submit-btn" onclick="checkAnswers()">Submit</button>
<button class="reset-btn" onclick="resetQuiz()">Reset</button>

<div id="result" class="result"></div>
</div>

<script>

// ==========================
// QUESTIONS
// ==========================
const exams = {
    rhel8: [
        {q:"SSH config file?", options:["/etc/ssh/sshd_config","/etc/passwd"], answer:0},
        {q:"Check logs?", options:["journalctl","ls"], answer:0}
    ],
    rhel9: [
        {q:"Default firewall?", options:["firewalld","iptables"], answer:0},
        {q:"Check SELinux?", options:["sestatus","pwd"], answer:0}
    ],
    mock: [
        {q:"Change ownership?", options:["chown","chmod"], answer:0}
    ]
};

// ==========================
// RENDER QUESTIONS
// ==========================
function render() {
    for (let key in exams) {
        const container = document.getElementById(key);
        container.innerHTML = "";

        exams[key].forEach((q, i) => {
            let optionsHTML = "";

            q.options.forEach((opt, j) => {
                optionsHTML += `
                    <label>
                        <input type="radio" name="${key}-${i}" value="${j}">
                        ${opt}
                    </label><br>
                `;
            });

            container.innerHTML += `
                <div class="question">
                    <h3>${i+1}. ${q.q}</h3>
                    ${optionsHTML}
                </div>
            `;
        });
    }
}

// ==========================
// TAB SWITCH
// ==========================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.querySelectorAll('.exam-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');

        document.getElementById("result").innerText = "";
    });
});

// ==========================
// CHECK ANSWERS
// ==========================
function checkAnswers() {
    const activeTab = document.querySelector('.tab-btn.active').dataset.tab;

    let score = 0;
    let total = exams[activeTab].length;

    exams[activeTab].forEach((q, i) => {
        const selected = document.querySelector(`input[name="${activeTab}-${i}"]:checked`);
        if (selected && parseInt(selected.value) === q.answer) {
            score++;
        }
    });

    document.getElementById("result").innerText =
        `Score: ${score} / ${total}`;
}

// ==========================
// RESET
// ==========================
function resetQuiz() {
    document.querySelectorAll("input[type='radio']").forEach(r => r.checked = false);
    document.getElementById("result").innerText = "";
}

// ==========================
render();
</script>

</body>
</html>
