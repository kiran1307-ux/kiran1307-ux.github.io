// ==========================
// Tab switching
// ==========================
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.exam-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
        document.getElementById('exam-result').innerText = ''; // Clear score when switching
    });
});

// ==========================
// Render questions dynamically
// ==========================
for (let key in exams) {
    const container = document.getElementById(key);
    exams[key].forEach((item,i)=>{
        const div = document.createElement('div');
        div.className = 'question';
        let opts = '';
        item.options.forEach((opt,j)=>{
            opts += `<label><input type="radio" name="${key}-${i}" value="${j}"> ${opt}</label>`;
        });
        div.innerHTML = `<h3>${i+1}. ${item.q}</h3><div class="options">${opts}</div><p class="explanation">${item.explanation}</p>`;
        container.appendChild(div);
    });
}

// ==========================
// Check Answers
// ==========================
function checkAnswers(){
    const activeTab = document.querySelector('.exam-section.active').id;
    let score = 0;
    exams[activeTab].forEach((item,i)=>{
        const sel = document.querySelector(`input[name="${activeTab}-${i}"]:checked`);
        const exp = document.querySelectorAll(`#${activeTab} .explanation`)[i];
        if(sel && parseInt(sel.value)===item.answer) score++;
        exp.style.display = 'block'; // show explanation after submit
    });
    const total = exams[activeTab].length;
    const percentage = Math.round((score/total)*100);
    let msg = percentage >= 80 ? "Good job! Keep practicing." : "Keep practicing! You can improve.";
    document.getElementById('exam-result').innerText = `Your Score: ${score}/${total} (${percentage}%)\n${msg}`;
}
