<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Hardening Exam</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}
.navbar {
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background: rgba(0,0,0,0.3);
}
.nav-btn {
    text-decoration:none;
    color:white;
    padding:8px 15px;
    border-radius:6px;
    background: rgba(255,255,255,0.1);
}
.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}
h1{text-align:center;color:#facc15;}
.tab-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}
.tab-btn{
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.exam-section{display:none;}
.exam-section.active{display:block;}
.question{margin-bottom:20px;}
.options label{display:block;}
.correct + span {color:#22c55e;}
.wrong + span {color:#ef4444;}
</style>
</head>

<body>

<div class="container">
<h1>Linux Hardening Exam</h1>

<div class="tab-buttons">
<button class="tab-btn active" data-tab="rhel8">RHEL8</button>
<button class="tab-btn" data-tab="rhel9">RHEL9</button>
<button class="tab-btn" data-tab="mock">MOCK</button>
</div>

<div id="rhel8" class="exam-section active"></div>
<div id="rhel9" class="exam-section"></div>
<div id="mock" class="exam-section"></div>

<button onclick="checkAnswers()">Submit</button>
<button onclick="resetExam()">Reset</button>

<h2 id="result"></h2>

</div>

<script>
const exams = {

rhel8:[
{q:"Which file controls SSH configurations in RHEL 8?", options:["/etc/ssh/sshd_config","/etc/ssh/config","/etc/passwd","/etc/security/limits.conf"], answer:0},
{q:"Which command verifies journal logs?", options:["journalctl","systemctl status","dmesg","cat /var/log/messages"], answer:0},
{q:"Command to disable root SSH login?", options:["PermitRootLogin no","AllowRootLogin yes","RootLogin off","DenyRoot yes"], answer:0},
{q:"File to configure password policies?", options:["/etc/security/pwquality.conf","/etc/login.defs","/etc/passwd","/etc/group"], answer:0},
{q:"Command to restrict kernel pointers?", options:["echo 1 > /proc/sys/kernel/kptr_restrict","sysctl net.ipv4.ip_forward=0","chmod 600 /etc/shadow","chown root:root /etc/shadow"], answer:0},
{q:"Which command checks failed login attempts?", options:["lastb","last","who","id"], answer:0},
{q:"Which file logs authentication attempts?", options:["/var/log/secure","/var/log/messages","/var/log/syslog","/var/log/auth.log"], answer:0},
{q:"Command to find SUID files?", options:["find / -perm -4000","ls -l","chmod","ps"], answer:0},
{q:"Command to check open ports?", options:["ss -tuln","top","df -h","ps"], answer:0},
{q:"Which command checks sudo permissions?", options:["sudo -l","sudo su","id","whoami"], answer:0},
{q:"Command to reload systemd config?", options:["systemctl daemon-reload","systemctl restart","init 6","reboot"], answer:0},
{q:"Which command checks kernel version?", options:["uname -r","hostnamectl","uptime","df -h"], answer:0},
{q:"Command to view CPU info?", options:["lscpu","top","free -m","ps"], answer:0},
{q:"Command to list block devices?", options:["lsblk","df -h","mount","du"], answer:0},
{q:"Command to show process tree?", options:["pstree","ps aux","top","htop"], answer:0}
],

rhel9:[
{q:"Default firewall in RHEL 9?", options:["firewalld","iptables","ufw","nftables"], answer:0},
{q:"Command to verify SELinux status?", options:["sestatus","getenforce","setenforce 1","selinux-config"], answer:0},
{q:"Command to check failed SSH logins?", options:["journalctl -u sshd","lastb","ausearch","cat /var/log/secure"], answer:0},
{q:"File to configure password aging?", options:["/etc/login.defs","/etc/security/pwquality.conf","/etc/shadow","/etc/passwd"], answer:0},
{q:"Command to check disk usage?", options:["df -h","du -sh","lsblk","fdisk -l"], answer:0},
{q:"Which command manages authentication profiles?", options:["authselect","authconfig","passwd","useradd"], answer:0},
{q:"Command to check active connections?", options:["ss -s","netstat","ifconfig","route"], answer:0},
{q:"Which file stores hashed passwords?", options:["/etc/shadow","/etc/passwd","/etc/group","/etc/hosts"], answer:0},
{q:"Command to list enabled services?", options:["systemctl list-unit-files","chkconfig","ps","top"], answer:0},
{q:"Command to monitor logs live?", options:["journalctl -f","tail -f","dmesg","logwatch"], answer:0},
{q:"Command to check memory usage?", options:["free -m","df -h","ls","pwd"], answer:0},
{q:"Command to display uptime?", options:["uptime","who","id","pwd"], answer:0},
{q:"Command to list mounted filesystems?", options:["mount","df -h","lsblk","blkid"], answer:0},
{q:"Command to find world writable files?", options:["find / -perm -0002","chmod","ls","pwd"], answer:0},
{q:"Command to check SELinux denials?", options:["ausearch -m avc","getenforce","sestatus","auditctl"], answer:0}
],

mock:[
{q:"Which command changes file ownership?", options:["chown","chmod","ls","passwd"], answer:0},
{q:"Which command sets file permissions?", options:["chmod","chown","ls","passwd"], answer:0},
{q:"Command to view running processes?", options:["ps aux","top","htop","jobs"], answer:0},
{q:"Command to check disk space?", options:["df -h","du","lsblk","fdisk"], answer:0},
{q:"Command to check listening ports?", options:["ss -tuln","netstat","lsof","iptables"], answer:0},
{q:"Command to view logs?", options:["journalctl","dmesg","cat log","tail"], answer:0},
{q:"Command to restart service?", options:["systemctl restart","service restart","init","reload"], answer:0},
{q:"Command to lock user?", options:["usermod -L","passwd -l","chage","pwconv"], answer:0},
{q:"Command to unlock user?", options:["usermod -U","passwd -u","chage","pwconv"], answer:0},
{q:"Command to check SELinux?", options:["sestatus","getenforce","top","ps"], answer:0},
{q:"Command to check failed logins?", options:["lastb","last","who","id"], answer:0},
{q:"Command to display hostname?", options:["hostname","uname","whoami","pwd"], answer:0},
{q:"Command to show environment variables?", options:["env","set","print","vars"], answer:0},
{q:"Command to check open files?", options:["lsof","ps","top","df"], answer:0},
{q:"Command to monitor system?", options:["top","htop","ps","free"], answer:0}
]

};

// render
function render(tab){
let html="";
exams[tab].forEach((q,i)=>{
html+=`
<div class="question">
<h3>${i+1}. ${q.q}</h3>
${q.options.map((opt,j)=>`
<label>
<input type="radio" name="${tab}-${i}" value="${j}">
<span>${opt}</span>
</label>`).join("")}
</div>`;
});
document.getElementById(tab).innerHTML=html;
}

["rhel8","rhel9","mock"].forEach(render);

// tabs
document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".exam-section").forEach(s=>s.classList.remove("active"));
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

// check
function checkAnswers(){
let score=0;
Object.keys(exams).forEach(tab=>{
exams[tab].forEach((q,i)=>{
let sel=document.querySelector(`input[name="${tab}-${i}"]:checked`);
if(sel && parseInt(sel.value)===q.answer){
score++;
}
});
});
document.getElementById("result").innerText="Score: "+score;
}

// reset
function resetExam(){
location.reload();
}
</script>

</body>
</html>
