<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Hardening Exam</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}
.navbar {
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background: rgba(0,0,0,0.3);
}
.nav-btn {
    text-decoration:none;
    color:white;
    padding:8px 15px;
    border-radius:6px;
    background: rgba(255,255,255,0.1);
    transition:0.3s;
    font-weight:bold;
}
.nav-btn:hover {
    background: rgba(255,255,255,0.3);
}

.container {
    padding: 40px 20px;
    max-width: 900px;
    margin:auto;
}
h1 {
    text-align:center;
    font-size:42px;
    margin-bottom:20px;
    color:#facc15;
}
.tab-buttons {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}
.tab-btn {
    padding: 10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background: rgba(255,255,255,0.1);
    color:#fff;
    font-weight:bold;
    transition:0.3s;
}
.tab-btn:hover, .tab-btn.active {
    background: #38bdf8;
    color:#111;
}

.exam-section {
    display:none;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(8px);
}
.exam-section.active {
    display:block;
}
.question {
    margin-bottom:20px;
}
.question h3 {
    font-size:18px;
    margin-bottom:10px;
}
.options label {
    display:block;
    margin-bottom:5px;
    cursor:pointer;
}
button.submit-btn {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#111;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button.submit-btn:hover {
    background:#16a34a;
}
.result {
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:#facc15;
}
</style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="about.html" class="nav-btn">About</a>
    <a href="author.html" class="nav-btn">Author</a>
    <a href="exam.html" class="nav-btn">Exam</a>
</div>

<div class="container">
    <h1>📝 Linux Hardening Practice Exams</h1>
    
    <div class="tab-buttons">
        <button class="tab-btn active" data-tab="rhel8">RHEL 8 Quiz</button>
        <button class="tab-btn" data-tab="rhel9">RHEL 9 Quiz</button>
        <button class="tab-btn" data-tab="mock">Mock Test</button>
    </div>

    <!-- RHEL 8 Quiz -->
    <div id="rhel8" class="exam-section active">
        <div class="question">
            <h3>1. Which file controls SSH configurations in RHEL 8?</h3>
            <div class="options">
                <label><input type="radio" name="q1"> /etc/ssh/sshd_config</label>
                <label><input type="radio" name="q1"> /etc/ssh/config</label>
                <label><input type="radio" name="q1"> /etc/passwd</label>
                <label><input type="radio" name="q1"> /etc/security/limits.conf</label>
            </div>
        </div>
        <div class="question">
            <h3>2. Which command verifies journal logs?</h3>
            <div class="options">
                <label><input type="radio" name="q2"> journalctl</label>
                <label><input type="radio" name="q2"> systemctl status</label>
                <label><input type="radio" name="q2"> dmesg</label>
                <label><input type="radio" name="q2"> cat /var/log/messages</label>
            </div>
        </div>
        <!-- Add more questions up to 30-40 -->
        <button class="submit-btn" onclick="checkAnswers('rhel8')">Submit</button>
        <div class="result" id="rhel8-result"></div>
    </div>

    <!-- RHEL 9 Quiz -->
    <div id="rhel9" class="exam-section">
        <div class="question">
            <h3>1. What is the default firewall service in RHEL 9?</h3>
            <div class="options">
                <label><input type="radio" name="q1r9"> firewalld</label>
                <label><input type="radio" name="q1r9"> iptables</label>
                <label><input type="radio" name="q1r9"> ufw</label>
                <label><input type="radio" name="q1r9"> nftables</label>
            </div>
        </div>
        <!-- Add more questions up to 30-40 -->
        <button class="submit-btn" onclick="checkAnswers('rhel9')">Submit</button>
        <div class="result" id="rhel9-result"></div>
    </div>

    <!-- Mock Test -->
    <div id="mock" class="exam-section">
        <div class="question">
            <h3>1. Which command changes file ownership?</h3>
            <div class="options">
                <label><input type="radio" name="q1m"> chown</label>
                <label><input type="radio" name="q1m"> chmod</label>
                <label><input type="radio" name="q1m"> ls</label>
                <label><input type="radio" name="q1m"> passwd</label>
            </div>
        </div>
        <!-- Add more mock test questions up to 30-40 -->
        <button class="submit-btn" onclick="checkAnswers('mock')">Submit</button>
        <div class="result" id="mock-result"></div>
    </div>
</div>

<script>
// Tab switching
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.exam-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// Dummy answer checking
function checkAnswers(section) {
    let score = Math.floor(Math.random() * 31) + 10; // Random score for demo
    document.getElementById(`${section}-result`).innerText = `Your Score: ${score}/40`;
}
</script>

</body>
</html>
