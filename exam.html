<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Hardening Exam</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}
.navbar {
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background: rgba(0,0,0,0.3);
}
.nav-btn {
    text-decoration:none;
    color:white;
    padding:8px 15px;
    border-radius:6px;
    background: rgba(255,255,255,0.1);
    transition:0.3s;
    font-weight:bold;
}
.nav-btn:hover {
    background: rgba(255,255,255,0.3);
}
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}
h1{
    text-align:center;
    font-size:42px;
    margin-bottom:20px;
    color:#facc15;
}
.tab-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}
.tab-btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background: rgba(255,255,255,0.1);
    color:#fff;
    font-weight:bold;
    transition:0.3s;
}
.tab-btn:hover, .tab-btn.active{
    background:#38bdf8;
    color:#111;
}
.exam-section{
    display:none;
    background: rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    backdrop-filter:blur(8px);
}
.exam-section.active{display:block;}
.question{margin-bottom:20px;}
.question h3{font-size:18px;margin-bottom:10px;}
.options label{display:block;margin-bottom:5px;cursor:pointer;}
button.submit-btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#111;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button.submit-btn:hover{
    background:#16a34a;
}
.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    padding:15px;
    border-radius:10px;
}
.badge{
    display:none;
    margin:20px auto;
    background:#facc15;
    color:#111;
    font-weight:bold;
    font-size:22px;
    padding:15px 25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
    animation: pop 0.5s ease;
}
@keyframes pop{
    0%{transform:scale(0);}
    70%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="about.html" class="nav-btn">About</a>
    <a href="author.html" class="nav-btn">Author</a>
    <a href="exam.html" class="nav-btn">Exam</a>
</div>

<div class="container">
    <h1>📝 Linux Hardening Practice Exams</h1>

    <div class="tab-buttons">
        <button class="tab-btn active" data-tab="rhel8">RHEL 8 Quiz</button>
        <button class="tab-btn" data-tab="rhel9">RHEL 9 Quiz</button>
        <button class="tab-btn" data-tab="mock">Mock Test</button>
    </div>

    <div id="rhel8" class="exam-section active"></div>
    <div id="rhel9" class="exam-section"></div>
    <div id="mock" class="exam-section"></div>

    <button class="submit-btn" onclick="checkAnswers()">Submit</button>
    <div class="result" id="exam-result"></div>
    <div class="badge" id="exam-badge">🏆 Excellent! You scored above 80%!</div>
</div>

<script>
// Questions Arrays (Add 20+ per section)
const exams = {
    rhel8: [
        {q:"Which file controls SSH configurations in RHEL 8?", options:["/etc/ssh/sshd_config","/etc/ssh/config","/etc/passwd","/etc/security/limits.conf"], answer:0, explanation:"Secures SSH access and prevents root login."},
        {q:"Which command verifies journal logs?", options:["journalctl","systemctl status","dmesg","cat /var/log/messages"], answer:0, explanation:"Ensures integrity of system logs for auditing."},
        {q:"Change ownership of /etc/shadow to root", options:["chown root:root /etc/shadow","chmod 600 /etc/shadow","ls -l /etc/shadow","passwd"], answer:0, explanation:"Prevents unauthorized modification of critical files."},
        {q:"Set secure permissions for /etc/shadow", options:["chmod 600 /etc/shadow","chmod 644 /etc/shadow","chmod 777 /etc/shadow","chmod 755 /etc/shadow"], answer:0, explanation:"Restricts access to sensitive files."},
        {q:"Set SHA-512 password hashing", options:["authconfig --passalgo=sha512 --update","passwd","chage","pwpolicy"], answer:0, explanation:"Uses secure password hashing."},
        {q:"Restrict kernel pointer exposure", options:["echo 1 > /proc/sys/kernel/kptr_restrict","echo 0 > /proc/sys/kernel/kptr_restrict","sysctl -w net.ipv4.ip_forward=1","sysctl -w net.ipv4.conf.all.accept_redirects=1"], answer:0, explanation:"Prevents leaking kernel addresses to unprivileged users."},
        {q:"Password minimum length 12", options:["/etc/security/pwquality.conf","/etc/shadow","/etc/passwd","/etc/login.defs"], answer:0, explanation:"Enforces strong password complexity."},
        {q:"Disable root login via SSH", options:["PermitRootLogin no","PermitRootLogin yes","PasswordAuthentication yes","PasswordAuthentication no"], answer:0, explanation:"Secures SSH remote access."},
        {q:"Disable empty passwords", options:["PermitEmptyPasswords no","PermitEmptyPasswords yes","PasswordAuthentication yes","PasswordAuthentication no"], answer:0, explanation:"Prevents blank passwords on accounts."},
        {q:"Disable IP forwarding", options:["sysctl -w net.ipv4.ip_forward=0","sysctl -w net.ipv4.ip_forward=1","echo 0 > /proc/sys/kernel/ptrace_scope","echo 1 > /proc/sys/kernel/ptrace_scope"], answer:0, explanation:"Prevents packet forwarding for security."},
        {q:"Disable ICMP redirects", options:["sysctl -w net.ipv4.conf.all.accept_redirects=0","sysctl -w net.ipv4.conf.all.accept_redirects=1","echo 0 > /proc/sys/net/ipv4/conf/all/accept_redirects","iptables -F"], answer:0, explanation:"Prevents malicious route changes via ICMP redirects."},
        {q:"Disable unused USB modules", options:["echo 'install usb-storage /bin/true' > /etc/modprobe.d/disable-usb.conf","modprobe usb-storage","lsmod | grep usb","rmmod usb-storage"], answer:0, explanation:"Reduces attack surface by disabling unused kernel modules."},
        // Add more questions to reach 20-30
    ],
    rhel9: [
        {q:"Default firewall in RHEL 9?", options:["firewalld","iptables","ufw","nftables"], answer:0, explanation:"firewalld is default for RHEL 9."},
        {q:"Check SSH daemon status", options:["systemctl status sshd","service ssh status","journalctl -u sshd","ps aux | grep sshd"], answer:0, explanation:"Check SSH daemon using systemctl."},
        {q:"Set ownership of /etc/passwd", options:["chown root:root /etc/passwd","chmod 644 /etc/passwd","ls -l /etc/passwd","passwd"], answer:0, explanation:"Critical file should be root-owned."},
        {q:"Restrict kernel pointer exposure", options:["echo 1 > /proc/sys/kernel/kptr_restrict","echo 0 > /proc/sys/kernel/kptr_restrict","sysctl -w net.ipv4.ip_forward=1","sysctl -w net.ipv4.conf.all.accept_redirects=1"], answer:0, explanation:"Prevents leaking kernel addresses."},
        {q:"Set password min length to 14", options:["/etc/security/pwquality.conf","/etc/shadow","/etc/passwd","/etc/login.defs"], answer:0, explanation:"Enforces strong password complexity."},
        // Add more to reach 20-30 questions
    ],
    mock: [
        {q:"Which command changes file ownership?", options:["chown","chmod","ls","passwd"], answer:0, explanation:"chown changes file owner/group."},
        {q:"Check logs with journalctl?", options:["journalctl","systemctl","dmesg","cat /var/log/messages"], answer:0, explanation:"journalctl is for system logs."},
        // Add more for mock test
    ]
};

// Tab switching
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(tab=>{
    tab.addEventListener('click',()=>{
        tabs.forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.exam-section').forEach(sec=>sec.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
        document.getElementById('exam-result').innerText = '';
        document.getElementById('exam-badge').style.display='none';
    });
});

// Render questions dynamically
for(let key in exams){
    const container=document.getElementById(key);
    exams[key].forEach((item,i)=>{
        const div=document.createElement('div');
        div.className='question';
        let opts='';
        item.options.forEach((opt,j)=>{
            opts+=`<label><input type="radio" name="${key}-${i}" value="${j}"> ${opt}</label>`;
        });
        div.innerHTML=`<h3>${i+1}. ${item.q}</h3><div class="options">${opts}</div><p class="explanation">${item.explanation}</p>`;
        container.appendChild(div);
    });
}

// Check Answers & Badge
function checkAnswers(){
    let score=0;
    const activeTabBtn=document.querySelector('.tab-btn.active');
    const activeTab=activeTabBtn.dataset.tab;
    const questions=exams[activeTab];

    questions.forEach((item,i)=>{
        const sel=document.querySelector(`input[name="${activeTab}-${i}"]:checked`);
        if(sel && parseInt(sel.value)===item.answer) score++;
    });

    const percent=Math.round((score/questions.length)*100);
    const resultDiv=document.getElementById('exam-result');
    const badgeDiv=document.getElementById('exam-badge');

    if(percent>=80){
        resultDiv.style.background='#22c55e';
        resultDiv.style.color='#111';
        resultDiv.innerText=`Excellent! You scored ${score}/${questions.length} (${percent}%)`;
        badgeDiv.style.display='block';
    } else if(percent>=50){
        resultDiv.style.background='#facc15';
        resultDiv.style.color='#111';
        resultDiv.innerText=`Good! You scored ${score}/${questions.length} (${percent}%)`;
        badgeDiv.style.display='none';
    } else {
        resultDiv.style.background='#ef4444';
        resultDiv.style.color='#fff';
        resultDiv.innerText=`You scored ${score}/${questions.length} (${percent}%). Keep Practicing!`;
        badgeDiv.style.display='none';
    }
}
</script>

</body>
</html>
