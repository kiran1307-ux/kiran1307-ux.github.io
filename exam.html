// Tab switching
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.exam-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// Render questions dynamically
for (let key in exams) {
    const container = document.getElementById(key);
    exams[key].forEach((item,i)=>{
        const div = document.createElement('div');
        div.className = 'question';
        let opts = '';
        item.options.forEach((opt,j)=>{
            opts += `<label><input type="radio" name="${key}-${i}" value="${j}"> ${opt}</label>`;
        });
        div.innerHTML = `<h3>${i+1}. ${item.q}</h3><div class="options">${opts}</div><p class="explanation">${item.explanation}</p>`;
        container.appendChild(div);
    });
}

// Check Answers and show badge
function checkAnswers(){
    let score=0;
    let total=0;
    for(let key in exams){
        total+=exams[key].length;
        exams[key].forEach((item,i)=>{
            const sel = document.querySelector(`input[name="${key}-${i}"]:checked`);
            if(sel && parseInt(sel.value)===item.answer) score++;
        });
    }
    const percent = Math.round((score/total)*100);
    let badgeText = '';
    if(percent>=80){
        badgeText = `<div class="badge">🏆 Passed! ${percent}%</div>`;
    }else{
        badgeText = `<div class="badge fail">❌ Score: ${percent}%</div>`;
    }
    document.getElementById('exam-result').innerHTML = `Your Score: ${score}/${total} ${badgeText}`;
}
</script>
