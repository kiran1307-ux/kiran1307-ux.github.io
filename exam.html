<body>

<div class="navbar">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="about.html" class="nav-btn">About</a>

<h1>📝 Linux Hardening Mock Test</h1>

<div id="quiz-container"></div>
<button onclick="checkAnswers()">Submit Exam</button>

<script>
// 40 Questions Array
const questions = [
{q:"1. Which setting disables root SSH login?", options:["PermitRootLogin yes","PermitRootLogin no"], answer:1},
{q:"2. What enforces password complexity?", options:["pwquality.conf","sshd_config"], answer:0},
{q:"3. Which command sets file permissions?", options:["chmod","chown"], answer:0},
{q:"4. Which file controls cron jobs?", options:["/etc/crontab","/etc/passwd"], answer:0},
{q:"5. Which service manages system logs?", options:["journald","modprobe"], answer:0},
{q:"6. To restrict modules loading, you edit?", options:["modprobe.conf","pwquality.conf"], answer:0},
{q:"7. Which file stores user authentication settings?", options:["/etc/pam.d/system-auth","/etc/hosts"], answer:0},
{q:"8. What command shows disk usage?", options:["df -h","ls -l"], answer:0},
{q:"9. Which permission allows writing?", options:["w","r"], answer:0},
{q:"10. Which command changes file ownership?", options:["chmod","chown"], answer:1},
{q:"11. Default firewall tool in RHEL?", options:["firewalld","iptables"], answer:0},
{q:"12. SSH idle timeout parameter?", options:["ClientAliveInterval","PermitRootLogin"], answer:0},
{q:"13. PAM module for retry limits?", options:["pam_tally2","pam_unix"], answer:0},
{q:"14. SELinux mode enforcing?", options:["Enforcing","Permissive"], answer:0},
{q:"15. Disable unused services using?", options:["systemctl disable","chmod"], answer:0},
{q:"16. To prevent core dumps?", options:["ulimit","passwd"], answer:0},
{q:"17. RHEL 9 default package manager?", options:["dnf","yum"], answer:0},
{q:"18. SSH key-based auth file?", options:["~/.ssh/authorized_keys","~/.ssh/config"], answer:0},
{q:"19. What controls password aging?", options:["/etc/login.defs","/etc/passwd"], answer:0},
{q:"20. Tool to scan ports?", options:["nmap","tcpdump"], answer:0},
{q:"21. To audit system events?", options:["auditd","cron"], answer:0},
{q:"22. Kernel parameter config file?", options:["/etc/sysctl.conf","/etc/fstab"], answer:0},
{q:"23. Disable IPv6 temporarily?", options:["sysctl net.ipv6.conf.all.disable_ipv6=1","ifconfig"], answer:0},
{q:"24. Restrict world-writable files?", options:["chmod o-w file","chown file"], answer:0},
{q:"25. Which logs show authentication?", options:["/var/log/secure","/var/log/messages"], answer:0},
{q:"26. Cron job file location?", options:["/etc/cron.d","/etc/hosts"], answer:0},
{q:"27. Command to list active services?", options:["systemctl list-units","ls -l"], answer:0},
{q:"28. Disable password login in SSH?", options:["PasswordAuthentication no","PermitRootLogin yes"], answer:0},
{q:"29. Which file stores storage config?", options:["/etc/storaged.conf","/etc/fstab"], answer:0},
{q:"30. Correct way to lock user?", options:["usermod -L username","passwd username"], answer:0},
{q:"31. Enable automatic updates?", options:["dnf-automatic","systemctl start dnf"], answer:0},
{q:"32. View SELinux status?", options:["sestatus","getenforce"], answer:0},
{q:"33. Command to check listening ports?", options:["ss -tuln","df -h"], answer:0},
{q:"34. Disable guest login?", options:["systemctl disable gdm-guests","chmod 644"], answer:0},
{q:"35. Configure syslog server?", options:["rsyslog.conf","audit.rules"], answer:0},
{q:"36. Harden cron permissions?", options:["chmod 600 /etc/crontab","chmod 755 /etc/crontab"], answer:0},
{q:"37. Check disk permissions?", options:["ls -l /path","df -h"], answer:0},
{q:"38. Default RHEL firewall zone?", options:["public","external"], answer:0},
{q:"39. Command to reload firewall?", options:["firewall-cmd --reload","systemctl restart firewalld"], answer:0},
{q:"40. Recommended password min length?", options:["12","8"], answer:0}
];

// Generate HTML dynamically
const quizContainer = document.getElementById("quiz-container");

questions.forEach((q,i)=>{
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<h3>${q.q}</h3>` + q.options.map((opt,j)=>`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`).join("");
    quizContainer.appendChild(div);
});

function checkAnswers(){
    let score=0;
    questions.forEach((q,i)=>{
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if(selected && parseInt(selected.value)===q.answer) score++;
    });
    alert(`Your Score: ${score} / ${questions.length}`);
}
</script>
